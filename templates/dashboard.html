{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="d-flex justify-content-between align-items-end mb-4 fade-in">
            <div>
                <h2 class="fw-bold mb-0">Overview</h2>
                <p class="text-muted mb-0">Welcome back, <span class="text-primary fw-bold">{{ name }}</span>!</p>
            </div>
            <div>
                <a href="{{ url_for('upload_page') }}" class="btn btn-primary btn-lg shadow-sm"><i
                        class="fas fa-plus me-2"></i>New Summary</a>
            </div>
        </div>

        <div class="row mb-5">
            <div class="col-md-4 mb-3">
                <div class="card glass-effect h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-3">
                            <div class="bg-primary-subtle p-3 rounded-circle me-3">
                                <i class="fas fa-book-open text-primary fa-2x"></i>
                            </div>
                            <h5 class="card-title mb-0">My Library</h5>
                        </div>
                        <h2 class="fw-bold">{{ book_count }} <small class="text-muted fs-6">Books</small></h2>
                        <a href="{{ url_for('books') }}" class="btn btn-sm btn-outline-primary mt-2">Manage Books</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card glass-effect h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-3">
                            <div class="bg-success-subtle p-3 rounded-circle me-3">
                                <i class="fas fa-font text-success fa-2x"></i>
                            </div>
                            <h5 class="card-title mb-0">Total Words</h5>
                        </div>
                        <h2 class="fw-bold">{{ total_words }}</h2>
                        <p class="text-muted small">Processed across all sessions</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card glass-effect h-100 bg-light">
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-3">
                            <div class="bg-info-subtle p-3 rounded-circle me-3">
                                <i class="fas fa-robot text-info fa-2x"></i>
                            </div>
                            <h5 class="card-title mb-0">Quick Actions</h5>
                        </div>
                        <div class="d-grid gap-2">
                            <a href="{{ url_for('upload_page') }}" class="btn btn-sm btn-dark">Quick Upload</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
