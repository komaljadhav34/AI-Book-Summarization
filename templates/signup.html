{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-6">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-primary text-white py-4 px-4 text-center">
                <h2 class="fw-bold mb-0">Create Account</h2>
                <p class="mb-0 opacity-75">Join our AI Summarizer community</p>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('signup') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold"><i
                                class="fas fa-user me-2 text-primary"></i>Username</label>
                        <input type="text" class="form-control form-control-lg rounded-3" id="username" name="username"
                            placeholder="Choose a username" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold"><i
                                class="fas fa-envelope me-2 text-primary"></i>Email address</label>
                        <input type="email" class="form-control form-control-lg rounded-3" id="email" name="email"
                            placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold"><i
                                class="fas fa-lock me-2 text-primary"></i>Password</label>
                        <input type="password" class="form-control form-control-lg rounded-3" id="password"
                            name="password" placeholder="Create a strong password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 mt-3 shadow-sm">
                        <i class="fas fa-user-plus me-2"></i>Sign Up
                    </button>
                </form>
            </div>
            <div class="card-footer bg-light text-center py-3 border-0">
                <p class="mb-0">Already have an account? <a href="{{ url_for('login') }}"
                        class="text-primary fw-bold text-decoration-none">Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
