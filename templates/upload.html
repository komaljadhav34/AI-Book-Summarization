{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Upload Book</h3>
            </div>
            <div class="card-body">
                <form id="uploadForm">
                    <div class="mb-3">
                        <label for="title" class="form-label">Book Title</label>
                        <input type="text" class="form-control" id="title" name="title" required
                            placeholder="e.g. Great Expectations">
                    </div>
                    <div class="mb-3">
                        <label for="author" class="form-label">Author</label>
                        <input type="text" class="form-control" id="author" name="author" required
                            placeholder="e.g. Charles Dickens">
                    </div>

                    <ul class="nav nav-tabs mb-3" id="uploadTab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="file-tab" data-bs-toggle="tab"
                                data-bs-target="#file-upload" type="button" role="tab">File Upload</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="text-tab" data-bs-toggle="tab" data-bs-target="#text-paste"
                                type="button" role="tab">Paste Text</button>
                        </li>
                    </ul>

                    <div class="tab-content" id="uploadTabContent">
                        <div class="tab-pane fade show active" id="file-upload" role="tabpanel">
                            <div class="mb-3">
                                <label for="file" class="form-label">Choose PDF or TXT file</label>
                                <input type="file" class="form-control" id="file" name="file" accept=".pdf,.txt">
                            </div>
                        </div>
                        <div class="tab-pane fade" id="text-paste" role="tabpanel">
                            <div class="mb-3">
                                <label for="text" class="form-label">Paste text here</label>
                                <textarea class="form-control" id="text" name="text" rows="10"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary w-100" id="submitBtn">Upload & Process</button>
                    </div>
                </form>

                <div id="loading" class="mt-4 d-none text-center">
                    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-3 fs-5">Processing and Summarizing...</p>
                    <p class="text-muted small">This may take a moment for larger texts.</p>
                </div>

                <div id="result" class="mt-4 d-none fade-in">
                    <div class="alert alert-success border-0 shadow-sm glass-effect">
                        <h4 class="mb-3"><i class="fas fa-check-circle me-2"></i>Summary Ready</h4>
                        <div class="row mb-3">
                            <div class="col-sm-6">
                                <p class="mb-1 text-muted small">Book Title</p>
                                <p class="fw-bold" id="resTitle"></p>
                            </div>
                            <div class="col-sm-6 text-sm-end">
                                <p class="mb-1 text-muted small">Processing Stats</p>
                                <p class="text-secondary small"><span id="textLength"></span> chars processed</p>
                            </div>
                        </div>

                        <div class="summary-content bg-white p-4 rounded shadow-sm mb-4">
                            <h6 class="text-primary text-uppercase small ls-wide mb-2">AI Generated Summary</h6>
                            <p id="summaryText" class="mb-3 lead" style="font-size: 1.1rem; line-height: 1.6;"></p>
                        </div>

                        <div class="d-flex flex-wrap gap-2">
                            <a id="viewBtn" href="#" class="btn btn-primary"><i class="fas fa-eye me-1"></i> View
                                Details</a>
                            <a href="{{ url_for('books') }}" class="btn btn-outline-secondary"><i
                                    class="fas fa-list me-1"></i> Library</a>
                            <a id="downloadTxt" href="#" class="btn btn-dark"><i class="fas fa-file-alt me-1"></i>
                                .TXT</a>
                        </div>
                    </div>
                </div>

                <div id="error" class="mt-4 d-none">
                    <div class="alert alert-danger" id="errorMessage"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById("uploadForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        let formData = new FormData(this);
        let submitBtn = document.getElementById("submitBtn");
        let loadingDiv = document.getElementById("loading");
        let resultDiv = document.getElementById("result");
        let errorDiv = document.getElementById("error");

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Uploading...';
        resultDiv.classList.add("d-none");
        errorDiv.classList.add("d-none");

        try {
            // 1. Upload the text
            let response = await fetch("/upload-text", {
                method: "POST",
                body: formData
            });

            let data = await response.json();

            if (!response.ok) throw new Error(data.error || "Upload failed");

            const bookId = data.book_id;
            const title = document.getElementById("title").value;

            // 2. Change UI to Summarizing state
            submitBtn.classList.add("d-none");
            loadingDiv.classList.remove("d-none");

            // 3. Trigger summarization
            let sumResponse = await fetch(`/book/${bookId}/summarize`, {
                method: "POST"
            });
            let sumData = await sumResponse.json();

            if (!sumResponse.ok) throw new Error(sumData.error || "Summarization failed");

            // 4. Show results
            document.getElementById("resTitle").textContent = title;
            document.getElementById("textLength").textContent = data.length;
            document.getElementById("summaryText").textContent = sumData.summary;
            document.getElementById("viewBtn").href = `/book/${bookId}`;
            document.getElementById("downloadTxt").href = `/book/${bookId}/download/txt`;

            loadingDiv.classList.add("d-none");
            resultDiv.classList.remove("d-none");
            this.reset();

        } catch (err) {
            loadingDiv.classList.add("d-none");
            submitBtn.classList.remove("d-none");
            document.getElementById("errorMessage").textContent = err.message || "An error occurred during process.";
            errorDiv.classList.remove("d-none");
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Upload & Process";
        }
    });
</script>
{% endblock %}
